<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr V Mohan's Plate</title>
<style>
  :root {
    --red: #D42B2B;
    --dark: #1a1a1a;
    --grey: #6b7280;
    --bg: #D9D9D9;
    --font: 'Gill Sans', 'GillSans', 'Gill Sans MT', Calibri, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: var(--font); }
  .plate-wrap { display:flex; flex-direction:column; align-items:center; padding:2rem 0 1.5rem; gap:1.1rem; }
  .headline { font-size:20px; font-weight:600; color:var(--red); text-align:center; max-width:400px; margin:0; line-height:1.4; }
  .plate-container { position:relative; width:320px; height:320px; }
  .hint { font-size:13px; color:var(--grey); font-weight:500; margin:0; }
  .tooltip { position:absolute; background:#fff; color:var(--dark); border-radius:5px; padding:9px 13px; font-family:var(--font); font-size:13px; font-weight:500; line-height:1.4; pointer-events:none; opacity:0; transition:opacity 0.18s; width:185px; z-index:10; border-left:3px solid transparent; }
  .tooltip.visible { opacity:1; }
</style>
</head>
<body>

<div class="plate-wrap">
  <p class="headline">Dr V Mohan's recommended meal formula</p>

  <div class="plate-container" id="plate">
    <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;top:0;left:0;width:100%;height:100%;">
      <defs>
        <clipPath id="plateClip">
          <circle cx="160" cy="160" r="148"/>
        </clipPath>
      </defs>

      <!--
        The PNG is square. The plate (white rim) sits centred with background padding.
        xMidYMid slice fills the circle and keeps aspect ratio intact — no distortion.
        We make the image larger than the circle so it zooms in past the background.
        Adjust x/y/width/height until the green halo disappears for your specific image.
      -->
      <image href="plate.png"
        x="-89" y="-89"
        width="498" height="498"
        preserveAspectRatio="xMidYMid meet"
        clip-path="url(#plateClip)"
      />

      <!-- LEFT half: green leafy vegetables (50%) -->
      <path id="hit1"
        d="M160,160 L160,12 A148,148 0 0,0 160,308 Z"
        fill="#2a7d5f" fill-opacity="0" style="cursor:pointer;"
        clip-path="url(#plateClip)"/>

      <!-- TOP-RIGHT quarter: plant protein (25%) -->
      <path id="hit2"
        d="M160,160 L160,12 A148,148 0 0,1 308,160 Z"
        fill="#D42B2B" fill-opacity="0" style="cursor:pointer;"
        clip-path="url(#plateClip)"/>

      <!-- BOTTOM-RIGHT quarter: complex carbohydrates (25%) -->
      <path id="hit3"
        d="M160,160 L308,160 A148,148 0 0,1 160,308 Z"
        fill="#c47b2a" fill-opacity="0" style="cursor:pointer;"
        clip-path="url(#plateClip)"/>

      <circle cx="160" cy="160" r="148" fill="none" stroke="#d4c9b0" stroke-width="3"/>
    </svg>

    <div class="tooltip" id="tooltip"></div>
  </div>

  <p class="hint">Hover over each section of the plate</p>
</div>

<script>
  const sections = {
    hit1: { text: "Green leafy, non-starchy vegetables", color: "#2a7d5f", tipX: "left",  tipY: "mid"    },
    hit2: { text: "Plant protein",                       color: "#D42B2B", tipX: "right", tipY: "top"    },
    hit3: { text: "Complex carbohydrates",               color: "#c47b2a", tipX: "right", tipY: "bottom" }
  };

  const tooltip = document.getElementById('tooltip');

  Object.keys(sections).forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('mouseenter', () => {
      const s = sections[id];
      el.setAttribute('fill-opacity', '0.22');
      tooltip.textContent = s.text;
      tooltip.style.borderLeftColor = s.color;
      tooltip.style.left = (s.tipX === 'left' ? 6 : 129) + 'px';
      if (s.tipY === 'top')    tooltip.style.top = '16px';
      if (s.tipY === 'mid')    tooltip.style.top = '120px';
      if (s.tipY === 'bottom') tooltip.style.top = '248px';
      tooltip.classList.add('visible');
    });
    el.addEventListener('mouseleave', () => {
      el.setAttribute('fill-opacity', '0');
      tooltip.classList.remove('visible');
    });
  });
</script>

</body>
</html>
