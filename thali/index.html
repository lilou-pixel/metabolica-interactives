<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dr Mohan's Metabolically Positive Plate</title>
<style>
:root {
  --red: #D42B2B;
  --dark: #1a1a1a;
  --grey: #6b7280;
  --bg: #D9D9D9;
  --ring: #d4c9b0;
  --font: 'Gill Sans', 'GillSans', 'Gill Sans MT', Calibri, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); font-family: var(--font); }
.plate-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 0 1.5rem;
  gap: 1.1rem;
}
.headline {
  font-size: 20px;
  font-weight: 600;
  color: var(--red);
  text-align: center;
  max-width: 420px;
  line-height: 1.4;
}
.plate-container {
  position: relative;
  width: 320px;
  height: 320px;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid var(--ring);
  background-image: url("plate.png");
  background-repeat: no-repeat;
  background-position: 50% 50%;
  background-size: 245% auto;
}
.plate-overlay {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
.hint {
  font-size: 13px;
  color: var(--grey);
  font-weight: 500;
}
.tooltip {
  position: absolute;
  background: #fff;
  color: var(--dark);
  padding: 9px 13px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s;
  width: 185px;
  z-index: 10;
  border-left: 3px solid transparent;
  border-radius: 0 5px 5px 0;
}
.tooltip.visible { opacity: 1; }

.tap-labels {
  display: none;
  flex-direction: column;
  gap: 10px;
  width: 320px;
  margin-top: 4px;
}
.tap-label {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 14px;
  font-weight: 500;
  color: var(--dark);
  border-left: 4px solid transparent;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.22s, transform 0.22s;
}
.tap-label.visible {
  opacity: 1;
  transform: translateY(0);
}
.tap-swatch {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

@media (hover: none) and (pointer: coarse) {
  .hint-desktop { display: none; }
  .hint-mobile { display: block !important; }
  .tap-labels { display: flex; }
  .tooltip { display: none; }
}
.hint-mobile { display: none; }
</style>
</head>
<body>

<div class="plate-wrap">
  <p class="headline">Dr Mohan's metabolically positive plate</p>
  <div class="plate-container" id="plateContainer">
    <svg class="plate-overlay" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <path id="hit1"
        d="M160,160 L160,12 A148,148 0 0,0 160,308 Z"
        fill="#2a7d5f" fill-opacity="0" style="cursor:pointer;" />
      <path id="hit2"
        d="M160,160 L160,12 A148,148 0 0,1 308,160 Z"
        fill="#D42B2B" fill-opacity="0" style="cursor:pointer;" />
      <path id="hit3"
        d="M160,160 L308,160 A148,148 0 0,1 160,308 Z"
        fill="#c47b2a" fill-opacity="0" style="cursor:pointer;" />
    </svg>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <p class="hint hint-desktop">Hover over each section of the plate</p>
  <p class="hint hint-mobile">Tap each section of the plate</p>

  <div class="tap-labels" id="tapLabels">
    <div class="tap-label" id="tap-label-hit1" style="border-left-color: #2a7d5f;">
      <span class="tap-swatch" style="background:#2a7d5f;"></span>
      Green, leafy, non-starchy vegetables
    </div>
    <div class="tap-label" id="tap-label-hit2" style="border-left-color: #D42B2B;">
      <span class="tap-swatch" style="background:#D42B2B;"></span>
      Plant protein
    </div>
    <div class="tap-label" id="tap-label-hit3" style="border-left-color: #c47b2a;">
      <span class="tap-swatch" style="background:#c47b2a;"></span>
      Complex carbohydrates
    </div>
  </div>
</div>

<script>
const sections = {
  hit1: { text: "Green, leafy, non-starchy vegetables", color: "#2a7d5f", tipX: "left",  tipY: "mid" },
  hit2: { text: "Plant protein",         color: "#D42B2B", tipX: "right", tipY: "top" },
  hit3: { text: "Complex carbohydrates", color: "#c47b2a", tipX: "right", tipY: "bottom" }
};

const tooltip = document.getElementById("tooltip");
const isTouchDevice = () => window.matchMedia("(hover: none) and (pointer: coarse)").matches;

let activeId = null;

function showTooltip(id) {
  const s = sections[id];
  document.getElementById(id).setAttribute("fill-opacity", "0.22");
  tooltip.textContent = s.text;
  tooltip.style.borderLeftColor = s.color;
  tooltip.style.left = (s.tipX === "left" ? 8 : 126) + "px";
  if (s.tipY === "top")    tooltip.style.top = "16px";
  if (s.tipY === "mid")    tooltip.style.top = "118px";
  if (s.tipY === "bottom") tooltip.style.top = "246px";
  tooltip.classList.add("visible");
}

function hideTooltip(id) {
  document.getElementById(id).setAttribute("fill-opacity", "0");
  tooltip.classList.remove("visible");
}

function showTapLabel(id) {
  Object.keys(sections).forEach(k => {
    document.getElementById(k).setAttribute("fill-opacity", k === id ? "0.22" : "0");
    document.getElementById("tap-label-" + k).classList.toggle("visible", k === id);
  });
}

function clearTap() {
  Object.keys(sections).forEach(k => {
    document.getElementById(k).setAttribute("fill-opacity", "0");
    document.getElementById("tap-label-" + k).classList.remove("visible");
  });
  activeId = null;
}

Object.keys(sections).forEach(id => {
  const el = document.getElementById(id);

  el.addEventListener("mouseenter", () => {
    if (!isTouchDevice()) showTooltip(id);
  });
  el.addEventListener("mouseleave", () => {
    if (!isTouchDevice()) hideTooltip(id);
  });

  el.addEventListener("click", e => {
    if (!isTouchDevice()) return;
    e.stopPropagation();
    if (activeId === id) {
      clearTap();
    } else {
      activeId = id;
      showTapLabel(id);
    }
  });
});

document.addEventListener("click", () => {
  if (isTouchDevice()) clearTap();
});
</script>

</body>
</html>
