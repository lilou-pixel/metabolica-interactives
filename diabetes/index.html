<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes Prevalence</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --red: #D42B2B;
  --dark: #1a1a1a;
  --grey: #6b7280;
  --grey-light: #d1d5db;
  --bg: #D9D9D9;
  --font: 'Gill Sans', 'GillSans', 'Gill Sans MT', Calibri, sans-serif;
}

html, body {
  margin: 0; padding: 0;
  font-family: var(--font);
  background: var(--bg);
  overflow: hidden;
  height: 100%;
}

#widget {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
}

#track {
  display: flex;
  height: 100%;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
}

.slide {
  flex: 0 0 100%;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* ── Intro ── */
.intro-slide {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 28px 60px;
}
.intro-slide h1 {
  font-size: clamp(24px, 5.5vw, 42px);
  font-weight: 700; line-height: 1.2; color: var(--dark);
}
.intro-slide h1 span { color: var(--red); }
.start-btn {
  margin-top: 30px; padding: 13px 40px;
  background: var(--red); color: #fff; border: none; border-radius: 4px;
  font-family: var(--font); font-size: clamp(14px, 2vw, 16px); font-weight: 600;
  cursor: pointer; transition: background 0.2s; touch-action: manipulation;
}
.start-btn:hover { background: #b02222; }

/* ── Country slide ── */
.country-slide {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide-src {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--grey);
  text-align: center;
  padding: 0 20px 38px;
}

.country-map {
  display: flex;
  align-items: center;
  justify-content: center;
}
.country-map svg { width: 100%; height: 100%; overflow: visible; display: block; }

.country-info { display: flex; flex-direction: column; }

.country-rank-name {
  font-weight: 700; color: var(--dark); line-height: 1.15;
}
.country-rank-name em { font-style: normal; color: var(--red); }

.bottle-pct {
  font-weight: 700; color: var(--red); line-height: 1;
}

.bottle-wrap { width: 100%; }
.bottle-track {
  width: 100%; border-radius: 3px;
  background: rgba(0,0,0,0.1); overflow: hidden; position: relative;
}
.bottle-fill {
  position: absolute; bottom: 0; left: 0;
  width: 0%; height: 100%;
  background: var(--red); border-radius: 3px;
}


.nav-row { display: flex; gap: 10px; }
.nav-btn {
  border-radius: 4px;
  border: 1.5px solid var(--grey-light);
  background: rgba(255,255,255,0.75); color: var(--dark);
  font-family: var(--font); font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  touch-action: manipulation;
}
.nav-btn:hover { border-color: var(--dark); background: #fff; }
.nav-btn.invisible { visibility: hidden; pointer-events: none; }

/* ── Desktop ── */
@media (min-width: 640px) {
  .country-slide {
    flex-direction: row;
    gap: clamp(32px, 5vw, 64px);
    padding: 0 clamp(40px, 6vw, 80px);
  }
  .country-map {
    flex: 0 0 clamp(180px, 26vw, 260px);
    height: clamp(180px, 26vw, 260px);
  }
  .country-info { flex: 1; align-items: flex-start; gap: 10px; }
  .country-rank-name { font-size: clamp(26px, 4vw, 38px); margin-bottom: 4px; }
  .bottle-pct        { font-size: clamp(36px, 5.5vw, 52px); }
  .bottle-wrap       { max-width: 300px; margin-bottom: 4px; }
  .bottle-track      { height: 16px; }

  .nav-row           { margin-top: 16px; }
  .nav-btn           { padding: 9px 22px; font-size: 13px; }
}

/* ── Mobile ── */
@media (max-width: 639px) {
  .country-slide {
    flex-direction: column;
    gap: 16px;
    padding: 16px 24px 0;
    align-items: center;
    text-align: center;
  }
  .country-map { width: min(55vw, 180px); height: min(55vw, 180px); flex-shrink: 0; }
  .country-info { align-items: center; gap: 8px; width: 100%; }
  .country-rank-name { font-size: clamp(20px, 6vw, 28px); }
  .bottle-pct        { font-size: clamp(30px, 9vw, 40px); }
  .bottle-wrap       { max-width: 260px; margin-bottom: 4px; }
  .bottle-track      { height: 14px; }

  .nav-row           { margin-top: 10px; justify-content: center; }
  .nav-btn           { padding: 10px 24px; font-size: 14px; }
  .arrow             { display: none !important; }
}

/* ── Chrome ── */
#pbar {
  position: absolute; bottom: 0; left: 0; height: 3px;
  background: var(--red);
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 20; pointer-events: none;
}
#dots {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 20;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--grey-light); transition: all 0.35s;
  cursor: pointer; border: none; padding: 0; touch-action: manipulation;
}
.dot.active { background: var(--red); transform: scale(1.4); }
.dot:hover:not(.active) { background: var(--grey); }

.arrow {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 20;
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(255,255,255,0.92); border: 1px solid var(--grey-light);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 22px; color: var(--dark);
  transition: all 0.22s; font-family: var(--font);
}
.arrow:hover { background: var(--dark); color: #fff; border-color: var(--dark); }
.arrow.hidden { opacity: 0; pointer-events: none; }
#arr-l { left: 14px; }
#arr-r { right: 14px; }
</style>
</head>

];

const TOTAL = COUNTRIES.length + 1;
let cur = 0, busy = false;
const filled = new Array(TOTAL).fill(false);

const track  = document.getElementById('track');
const pbar   = document.getElementById('pbar');
const dotsEl = document.getElementById('dots');
const arrL   = document.getElementById('arr-l');
const arrR   = document.getElementById('arr-r');
const widget = document.getElementById('widget');

/* ── Intro slide ── */
(function () {
  const slide = document.createElement('div');
  slide.className = 'slide intro-slide';
  slide.innerHTML = `
    <h1>10 countries where adult<br>diabetes is most <span>prevalent</span></h1>
    <button class="start-btn" id="start-btn">Explore countries →</button>
  `;
  track.appendChild(slide);
  slide.querySelector('#start-btn').addEventListener('click', () => go(1));
})();

/* ── Country slides ── */
COUNTRIES.forEach((c, idx) => {
  const si = idx + 1;
  const slide = document.createElement('div');
  slide.className = 'slide';

  slide.innerHTML = `
    <div class="country-slide">
      <div class="country-map">
        <svg viewBox="${c.vb}" xmlns="http://www.w3.org/2000/svg" aria-label="${c.name} map">
          <defs>
            <clipPath id="clip-${si}"><path d="${c.path}"/></clipPath>
          </defs>
          <path d="${c.path}" fill="#C8F5C8" stroke="rgba(0,0,0,0.18)" stroke-width="0.9"/>
          <rect id="fill-${si}" x="0" y="100" width="100" height="0"
                fill="#D42B2B" opacity="0.85" clip-path="url(#clip-${si})"/>
          <path d="${c.path}" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="0.9"/>
        </svg>
      </div>
      <div class="country-info">
        <div class="country-rank-name"><em>${c.rank}.</em> ${c.name}</div>
        <div class="bottle-pct" id="pct-${si}">0%</div>
        <div class="bottle-wrap">
          <div class="bottle-track">
            <div class="bottle-fill" id="bar-${si}"></div>
          </div>
        </div>

        <div class="nav-row">
          <button class="nav-btn ${si === 1 ? 'invisible' : ''}" id="prev-${si}">← Prev</button>
          <button class="nav-btn ${si === TOTAL - 1 ? 'invisible' : ''}" id="next-${si}">Next →</button>
        </div>
      </div>
    </div>
    <div class="slide-src">Source: IDF Diabetes Atlas, 11th edition (2025)</div>
  `;

  track.appendChild(slide);
  slide.querySelector(`#prev-${si}`).addEventListener('click', () => go(si - 1));
  slide.querySelector(`#next-${si}`).addEventListener('click', () => go(si + 1));
});

/* ── Dots ── */
const dotEls = [];
for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.setAttribute('aria-label', `Slide ${i + 1}`);
  d.addEventListener('click', (n => () => go(n))(i));
  dotsEl.appendChild(d);
  dotEls.push(d);
}

/* ── UI ── */
function ui() {
  const w = widget.offsetWidth;
  track.style.transform = `translateX(-${cur * w}px)`;
  pbar.style.width = `${(cur / (TOTAL - 1)) * 100}%`;
  dotEls.forEach((d, i) => d.classList.toggle('active', i === cur));
  arrL.classList.toggle('hidden', cur === 0);
  arrR.classList.toggle('hidden', cur === TOTAL - 1);
}

/* ── Navigate ── */
function go(n) {
  if (n < 0 || n >= TOTAL || busy) return;
  busy = true;
  cur = n;
  ui();
  setTimeout(() => {
    busy = false;
    if (cur >= 1) animateCountry(cur);
  }, 820);
}

/* ── Animation — slower, smoother ease ── */
function animateCountry(si) {
  if (filled[si]) return;
  filled[si] = true;

  const c      = COUNTRIES[si - 1];
  const rect   = document.getElementById(`fill-${si}`);
  const bar    = document.getElementById(`bar-${si}`);
  const pctEl  = document.getElementById(`pct-${si}`);
  if (!rect || !bar || !pctEl) return;

  const DURATION   = 2200;          // slower overall
  const DELAY      = 200;           // brief pause before starting
  // Fill relative to the shape's own bounding box so 23% really looks like 23%
  const shapeH     = c.ymax - c.ymin;
  const targetMapH = (c.pct / 100) * shapeH;  // how many units to fill
  const fillBottom = c.ymax;                   // start fill from shape bottom
  let startTime    = null;

  function easeInOutCubic(t) {
    // starts slow, accelerates gently, then eases out — very smooth
    return t < 0.5
      ? 4 * t * t * t
      : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    const raw = Math.min(elapsed / DURATION, 1);
    const e   = easeInOutCubic(raw);

    const h = targetMapH * e;
    rect.setAttribute('y', String(fillBottom - h));
    rect.setAttribute('height', String(h));
    bar.style.width = (c.pct * e) + '%';

    // Show one decimal until complete, then snap to exact value
    pctEl.textContent = raw < 1
      ? (c.pct * e).toFixed(1) + '%'
      : c.pct + '%';

    if (raw < 1) requestAnimationFrame(step);
  }

  // Small delay so the slide transition finishes before animation starts
  setTimeout(() => requestAnimationFrame(step), DELAY);
}

/* ── Resize ── */
window.addEventListener('resize', () => {
  track.style.transition = 'none';
  ui();
  requestAnimationFrame(() => {
    track.style.transition = 'transform 0.8s cubic-bezier(0.4,0,0.2,1)';
  });
});

/* ── Touch / swipe ── */
let touchStartX = 0, touchStartY = 0;
widget.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
widget.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  const dy = Math.abs(touchStartY - e.changedTouches[0].clientY);
  if (Math.abs(dx) > 40 && Math.abs(dx) > dy) go(dx > 0 ? cur + 1 : cur - 1);
}, { passive: true });

/* ── Scroll wheel ── */
let acc = 0;
widget.addEventListener('wheel', e => {
  e.preventDefault();
  if (busy) return;
  acc += e.deltaY;
  if (Math.abs(acc) >= 80) { go(acc > 0 ? cur + 1 : cur - 1); acc = 0; }
}, { passive: false });

/* ── Keyboard ── */
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
});

/* ── Side arrows ── */
arrL.addEventListener('click', () => go(cur - 1));
arrR.addEventListener('click', () => go(cur + 1));

ui();
</script>
