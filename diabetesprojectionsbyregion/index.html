<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diabetes by Region</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --red: #D42B2B;
  --dark: #1a1a1a;
  --grey: #6b7280;
  --grey-light: #d1d5db;
  --bg: #D9D9D9;
  --land: #c8c4bb;
  --land-active: #1a1a1a;
  --font: 'Gill Sans','GillSans','Gill Sans MT',Calibri,sans-serif;
  --h: 520px;
  --pad: 72px;
}

html, body { margin: 0; padding: 0; font-family: var(--font); background: var(--bg); }

#widget { position: relative; width: 100%; height: var(--h); background: var(--bg); }
#viewport { position: absolute; inset: 0; overflow: hidden; }
#track { display: flex; height: var(--h); transition: transform 0.8s cubic-bezier(0.4,0,0.2,1); will-change: transform; }

/* ── INTRO ── */
.intro-slide {
  flex: 0 0 100%; width: 100%; height: var(--h);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); padding: 0 var(--pad);
}
.intro-inner { display: flex; flex-direction: column; align-items: center; text-align: center; }
.intro-inner h1 { font-size: 30px; font-weight: 700; line-height: 1.25; color: var(--dark); max-width: 600px; }
.intro-inner h1 span { color: var(--red); }
.start-btn {
  margin-top: 28px; padding: 12px 36px;
  background: var(--red); color: #fff; border: none; border-radius: 4px;
  font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.start-btn:hover { background: #b02222; }

/* ── REGION SLIDE ── */
.slide {
  flex: 0 0 100%; width: 100%; height: var(--h);
  display: flex; flex-direction: row; position: relative; background: var(--bg);
}
.slide-left {
  width: 44%; padding: 40px 28px 60px var(--pad);
  display: flex; flex-direction: column; justify-content: center; flex-shrink: 0;
}
.slide-right {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 8px var(--pad) 52px 0; min-width: 0;
}

.region-name { font-size: 22px; font-weight: 700; color: var(--dark); line-height: 1.2; margin-bottom: 16px; }

.legend { display: flex; gap: 18px; margin-bottom: 16px; }
.leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--grey); font-weight: 500; }
.leg-swatch { width: 26px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.leg-2024 { background: var(--red); opacity: 0.45; }
.leg-2050 { background: var(--red); }
.legend-note { font-size: 10px; color: var(--grey); margin-bottom: 12px; letter-spacing: 0.01em; }

.bar-row { display: flex; align-items: center; margin-bottom: 10px; }
.bar-year { font-size: 12px; font-weight: 600; color: var(--grey); width: 38px; flex-shrink: 0; letter-spacing: .03em; }
.bar-track { flex: 1; height: 34px; background: rgba(0,0,0,0.08); border-radius: 3px; position: relative; overflow: visible; }
.bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; width: 0; }
.bar-fill.bar-2024 { background: var(--red); opacity: 0.45; }
.bar-fill.bar-2050 { background: var(--red); }
.bar-pct {
  position: absolute; left: 100%; top: 50%; transform: translateY(-50%);
  font-size: 14px; font-weight: 700; color: var(--dark);
  margin-left: 10px; white-space: nowrap; opacity: 0;
}

.case-sentence { font-size: 13px; color: var(--dark); line-height: 1.65; margin-top: 16px; font-weight: 500; }
.src { position: absolute; bottom: 40px; left: var(--pad); right: var(--pad); font-size: 11px; color: var(--grey); }

/* ── MAP ── */
.country { fill: var(--land); stroke: var(--bg); stroke-width: 0.5; transition: fill 0.55s ease; }
.country.hi { fill: var(--land-active); }

/* ── METHODOLOGY ── */
.method-slide {
  flex: 0 0 100%; width: 100%; height: var(--h);
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); padding: 0 var(--pad);
}
.methodology-text { font-size: 13px; color: var(--grey); line-height: 1.8; max-width: 660px; text-align: left; }

/* ── NAV ── */
#pbar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--red); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); z-index: 20; pointer-events: none; }
#dots { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 20; align-items: center; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--grey-light); transition: all 0.4s; cursor: pointer; border: none; padding: 0; display: block; }
.dot.active { background: var(--red); transform: scale(1.35); }
.dot:hover:not(.active) { background: var(--grey); }
.arrow {
  position: absolute; top: calc(50% - 18px); transform: translateY(-50%); z-index: 20;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.9); border: 1px solid var(--grey-light);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 24px; color: var(--dark);
  transition: all 0.25s; font-family: var(--font); line-height: 1;
}
.arrow:hover { background: var(--dark); color: #fff; border-color: var(--dark); }
.arrow.hidden { opacity: 0; pointer-events: none; }
#arr-l { left: 16px; }
#arr-r { right: 16px; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  #widget { height: auto; }
  #track { height: auto; align-items: flex-start; }
  .intro-slide { height: auto; min-height: 280px; padding: 48px 24px; }
  .intro-inner h1 { font-size: 22px; }
  .method-slide { height: auto; min-height: 260px; padding: 40px 24px; }
  .methodology-text { font-size: 12px; }
  .slide { flex-direction: column; height: auto; }
  .slide-left { width: 100%; padding: 28px 24px 10px; }
  .slide-right { width: 100%; padding: 4px 16px 8px; }
  .region-name { font-size: 18px; margin-bottom: 10px; }
  .bar-row { margin-bottom: 10px; padding-right: 52px; }
  .bar-pct { font-size: 12px; margin-left: 6px; }
  .case-sentence { font-size: 12.5px; margin-top: 12px; }
  .src { position: static; display: block; padding: 10px 24px 0; font-size: 10px; left: auto; right: auto; bottom: auto; }
  .src::after { content: ''; display: block; height: 46px; }
  #dots { bottom: 12px; }
  .arrow { display: none; }
}
</style>
</head>
<body>
<div id="widget">
  <div id="viewport"><div id="track"></div></div>
  <div id="pbar"></div>
  <div id="dots"></div>
  <button class="arrow hidden" id="arr-l">&#8249;</button>
  <button class="arrow" id="arr-r">&#8250;</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
// ISO alpha-3 → numeric mapping — sourced directly from IDF Atlas 11th ed. (2025) factsheets
// Note: small island territories (Mauritius, Seychelles, Cape Verde, Comoros, Sao Tome,
// Mayotte, Fr. Polynesia, Guam, Niue, Micronesia, Hong Kong, Macau) are not present as
// separate polygons in the 110m topojson — too small to render at this resolution.
const NUMERIC = {
  // MENA (21): Afghanistan, Algeria, Bahrain, Egypt, Iraq, Iran, Jordan, Kuwait, Lebanon,
  // Libya, Morocco, Oman, Pakistan, Qatar, Saudi Arabia, State of Palestine, Sudan,
  // Syria, Tunisia, UAE, Yemen
  'AFG':4,'DZA':12,'BHR':48,'EGY':818,'IRQ':368,'IRN':364,'JOR':400,
  'KWT':414,'LBN':422,'LBY':434,'MAR':504,'OMN':512,'PAK':586,'PSE':275,
  'QAT':634,'SAU':682,'SDN':729,'SYR':760,'TUN':788,'ARE':784,'YEM':887,
  // SEA (7) — renderable ones only; Mauritius (480) not in topojson at 110m
  'BGD':50,'BTN':64,'IND':356,'MDV':462,'NPL':524,'LKA':144,
  // WP (37) — renderable ones; HKG(344), MAC(446), PYF(258), GUM(316), NIU(570), FSM(583) not in topojson
  'AUS':36,'BRN':96,'KHM':116,'CHN':156,'PRK':408,'FJI':242,
  'IDN':360,'JPN':392,'KIR':296,'LAO':418,'MYS':458,
  'MHL':584,'MNG':496,'MMR':104,'NRU':520,'NCL':540,'NZL':554,'PLW':585,
  'PNG':598,'PHL':608,'KOR':410,'WSM':882,'SGP':702,'SLB':90,'TWN':158,'THA':764,
  'TLS':626,'TON':776,'TUV':798,'VUT':548,'VNM':704,
  // SACA (19) — PRI(630) is in topojson
  'ARG':32,'BOL':68,'BRA':76,'CHL':152,'COL':170,'CRI':188,'CUB':192,'DOM':214,
  'ECU':218,'SLV':222,'GTM':320,'HND':340,'NIC':558,'PAN':591,'PRY':600,'PER':604,
  'PRI':630,'URY':858,'VEN':862,
  // AFR (49) — CPV(132), COM(174), STP(678), SYC(690), MYT(175) not in topojson at 110m
  // Western Sahara (ESH:732) is in Africa factsheet — Africa only, not MENA
  // Note: ESH shares its topojson polygon with Morocco so colours together with it
  'AGO':24,'BEN':204,'BWA':72,'BFA':854,'BDI':108,'CMR':120,'CAF':140,
  'TCD':148,'COD':180,'DJI':262,'GNQ':226,'ERI':232,'SWZ':748,'ETH':231,
  'GAB':266,'GMB':270,'GHA':288,'GIN':324,'GNB':624,'CIV':384,'KEN':404,'LSO':426,
  'LBR':430,'MDG':450,'MWI':454,'MLI':466,'MRT':478,'MOZ':508,'NAM':516,
  'NER':562,'NGA':566,'COG':178,'RWA':646,'SEN':686,'SLE':694,
  'SOM':706,'ZAF':710,'SSD':728,'TGO':768,'UGA':800,'TZA':834,'ZMB':894,
  'ZWE':716
};

const REGIONS = [
  {
    name: 'Middle East &amp; North Africa',
    p24: 19.9, p50: 22.8,
    cases: '85 million people live with diabetes in the Middle East &amp; North Africa region, projected to rise to 163 million by 2050. The highest prevalence of any IDF region.',
    iso: ['AFG','DZA','BHR','EGY','IRQ','IRN','JOR','KWT','LBN','LBY','MAR','OMN',
          'PAK','PSE','QAT','SAU','SDN','SYR','TUN','ARE','YEM']
  },
  {
    name: 'Western Pacific',
    p24: 11.1, p50: 12.8,
    cases: '215 million people live with diabetes in the Western Pacific IDF region – more than any other. Projected to reach 254 million by 2050.',
    iso: ['AUS','BRN','KHM','CHN','PRK','FSM','FJI','PYF','GUM','HKG','IDN','JPN',
          'KIR','LAO','MAC','MYS','MHL','MNG','MMR','NRU','NCL','NZL','NIU','PLW',
          'PNG','PHL','KOR','WSM','SGP','SLB','TWN','THA','TLS','TON','TUV','VUT','VNM']
  },
  {
    name: 'South-East Asia',
    p24: 10.8, p50: 13.0,
    cases: '107 million people live with diabetes in the South-East Asia IDF region, projected to reach 185 million by 2050.',
    iso: ['BGD','BTN','IND','MDV','MUS','NPL','LKA']
  },
  {
    name: 'South &amp; Central America',
    p24: 10.1, p50: 11.5,
    cases: '35 million people live with diabetes in the South &amp; Central America IDF region, projected to reach 52 million by 2050.',
    iso: ['ARG','BOL','BRA','CHL','COL','CRI','CUB','DOM','ECU','SLV','GTM','HND',
          'NIC','PAN','PRY','PER','PRI','URY','VEN']
  },
  {
    name: 'Africa',
    p24: 5.0, p50: 5.9,
    cases: '25 million people live with diabetes in Africa, projected to reach 60 million by 2050 – the fastest rate of growth of any IDF region. Over 70 per cent of cases are currently undiagnosed.',
    iso: ['AGO','BEN','BWA','BFA','BDI','CMR','CPV','CAF','TCD','COM','COD','DJI',
          'GNQ','ERI','SWZ','ETH','GAB','GMB','GHA','GIN','GNB','CIV','KEN','LSO',
          'LBR','MDG','MWI','MLI','MRT','MYT','MOZ','NAM','NER','NGA','COG','RWA',
          'STP','SEN','SYC','SLE','SOM','ZAF','SSD','TGO','UGA','TZA','ZMB','ZWE']
  }
];

const TOTAL = REGIONS.length + 2;
const track  = document.getElementById('track');
const pbar   = document.getElementById('pbar');
const dotsEl = document.getElementById('dots');
const arrL   = document.getElementById('arr-l');
const arrR   = document.getElementById('arr-r');
const widget = document.getElementById('widget');
let cur = 0, busy = false;
const isMobile = () => window.innerWidth <= 640;

/* ── INTRO ── */
const intro = document.createElement('div');
intro.className = 'intro-slide';
intro.innerHTML = `<div class="intro-inner"><h1>Diabetes by region:<br><span>the road to 2050</span></h1><button class="start-btn" id="start-btn">See the data ›</button></div>`;
track.appendChild(intro);
intro.querySelector('#start-btn').addEventListener('click', () => go(1));

/* ── REGION SLIDES ── */
const slideEls = [];
REGIONS.forEach((r, i) => {
  const s = document.createElement('div');
  s.className = 'slide';

  const w24 = r.p24;
  const w50 = r.p50;

  const left = document.createElement('div');
  left.className = 'slide-left';
  left.innerHTML = `
    <div class="region-name">${r.name}</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-swatch leg-2024"></div>2024</div>
      <div class="leg-item"><div class="leg-swatch leg-2050"></div>2050 (projected)</div>
    </div>
    <div class="bar-row">
      <div class="bar-year">2024</div>
      <div class="bar-track">
        <div class="bar-fill bar-2024" data-w="${w24}"></div>
        <div class="bar-pct">${r.p24.toFixed(1)}%</div>
      </div>
    </div>
    <div class="bar-row">
      <div class="bar-year">2050</div>
      <div class="bar-track">
        <div class="bar-fill bar-2050" data-w="${w50}"></div>
        <div class="bar-pct">${r.p50.toFixed(1)}%</div>
      </div>
    </div>
    <div class="case-sentence">${r.cases}</div>`;

  const right = document.createElement('div');
  right.className = 'slide-right';
  right.id = 'map-right-' + i;

  const src = document.createElement('div');
  src.className = 'src';
  src.textContent = 'Source: International Diabetes Federation (IDF) Diabetes Atlas, 11th edition, 2025';

  s.appendChild(left);
  s.appendChild(right);
  s.appendChild(src);
  track.appendChild(s);
  slideEls.push(s);
});

/* ── METHODOLOGY ── */
const meth = document.createElement('div');
meth.className = 'method-slide';
meth.innerHTML = `<p class="methodology-text">Prevalence figures are IDF estimates of total diabetes burden among adults aged 20–79, encompassing both diagnosed cases and those estimated to be undiagnosed. All figures are age-standardised to allow fair comparison across regions with different population age structures. Data are from the IDF Diabetes Atlas, 11th edition (2025), which covers 215 countries using studies conducted between 2005 and 2024. Five of the seven IDF regions are shown – those for which the Atlas publishes both a 2024 figure and a projected 2050 prevalence figure. Europe and North America &amp; Caribbean are excluded as the Atlas publishes projected case counts for these regions but not projected prevalence percentages, making a like-for-like comparison impossible.</p>`;
track.appendChild(meth);

/* ── DOTS ── */
const dotEls = [];
for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.setAttribute('aria-label', 'Go to slide ' + (i + 1));
  d.addEventListener('click', (function(n){ return function(){ go(n); }; })(i));
  dotsEl.appendChild(d);
  dotEls.push(d);
}

/* ── HEIGHT SYNC (mobile) ── */
function syncHeight() {
  if (!isMobile()) { widget.style.height = ''; return; }
  requestAnimationFrame(() => {
    const allS = track.querySelectorAll('.intro-slide, .slide, .method-slide');
    let h = 0;
    allS.forEach(s => { h = Math.max(h, s.offsetHeight); });
    widget.style.height = (h + 44) + 'px';
    document.getElementById('viewport').style.height = (h + 44) + 'px';
    track.style.height = (h + 44) + 'px';
  });
}

/* ── UI ── */
function ui() {
  const w = widget.offsetWidth;
  track.style.transform = 'translateX(-' + (cur * w) + 'px)';
  pbar.style.width = (cur / (TOTAL - 1) * 100) + '%';
  dotEls.forEach((d, i) => d.classList.toggle('active', i === cur));
  arrL.classList.toggle('hidden', cur === 0);
  arrR.classList.toggle('hidden', cur === TOTAL - 1);
  syncHeight();
}

/* ── BAR ANIMATION — always re-triggers on every visit ── */
function animateBars(slideEl) {
  const fills = slideEl.querySelectorAll('.bar-fill');
  const pcts  = slideEl.querySelectorAll('.bar-pct');
  fills.forEach(f => { f.style.transition = 'none'; f.style.width = '0%'; });
  pcts.forEach(p  => { p.style.opacity = '0'; p.style.transition = 'none'; });
  slideEl.offsetHeight;
  setTimeout(() => {
    fills[0].style.transition = 'width 0.85s cubic-bezier(0.4,0,0.2,1)';
    fills[0].style.width = fills[0].dataset.w + '%';
    setTimeout(() => { pcts[0].style.transition = 'opacity 0.3s'; pcts[0].style.opacity = '1'; }, 750);
  }, 100);
  setTimeout(() => {
    fills[1].style.transition = 'width 0.85s cubic-bezier(0.4,0,0.2,1)';
    fills[1].style.width = fills[1].dataset.w + '%';
    setTimeout(() => { pcts[1].style.transition = 'opacity 0.3s'; pcts[1].style.opacity = '1'; }, 750);
  }, 1100);
}

/* ── MAP ── */
let worldData = null;
function buildMap(container, regionIdx) {
  if (!worldData) return;
  const r = REGIONS[regionIdx];
  const activeNums = new Set(r.iso.map(c => NUMERIC[c]).filter(Boolean));
  const mobile = isMobile();
  const W = mobile ? 320 : 500, H = mobile ? 184 : 288, scale = mobile ? 52 : 80;
  const proj = d3.geoNaturalEarth1().scale(scale).translate([W / 2, H / 2 + Math.round(H * 0.04)]);
  const path = d3.geoPath(proj);
  const allFeatures = topojson.feature(worldData, worldData.objects.countries).features;
  const existing = container.querySelector('svg');
  if (existing) existing.remove();
  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet')
    .style('width', '100%').style('height', 'auto');
  svg.selectAll('.country')
    .data(allFeatures)
    .join('path')
    .attr('class', d => 'country' + (activeNums.has(+d.id) ? ' hi' : ''))
    .attr('d', path);
}

/* ── NAVIGATION — always re-animates on entry ── */
function go(n) {
  if (n < 0 || n >= TOTAL || busy) return;
  busy = true; cur = n; ui();
  const ri = n - 1;
  if (ri >= 0 && ri < REGIONS.length) {
    animateBars(slideEls[ri]);
    const cont = document.getElementById('map-right-' + ri);
    if (cont && worldData) buildMap(cont, ri);
  }
  setTimeout(() => { busy = false; }, 850);
}

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  worldData = world;
  ui();
});

/* ── WHEEL ── */
let acc = 0;
widget.addEventListener('wheel', e => {
  e.preventDefault();
  if (busy) return;
  acc += e.deltaY;
  if (Math.abs(acc) >= 80) { go(acc > 0 ? cur + 1 : cur - 1); acc = 0; }
}, { passive: false });

/* ── TOUCH / SWIPE (mobile) ── */
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
widget.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
}, { passive: true });
widget.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  const dy = Math.abs(touchStartY - e.changedTouches[0].clientY);
  const dt = Date.now() - touchStartTime;
  if (Math.abs(dx) > 40 && Math.abs(dx) > dy * 1.5 && dt < 500) {
    go(dx > 0 ? cur + 1 : cur - 1);
  }
}, { passive: true });

/* ── KEYBOARD ── */
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
});
arrL.addEventListener('click', () => go(cur - 1));
arrR.addEventListener('click', () => go(cur + 1));
window.addEventListener('resize', () => {
  track.style.transition = 'none';
  ui();
  requestAnimationFrame(() => { track.style.transition = 'transform 0.8s cubic-bezier(0.4,0,0.2,1)'; });
});

ui();
</script>
</body>
</html>
